<!DOCTYPE html>
<html lang="en" x-data="chatApp()" :class="{ 'chat-at-bottom': chatAtBottom }">
<head>
  <meta charset="UTF-8" />
  <title>Sustainapath Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
  <style>
    :root {
      --green-glow: #22c55e;
      --background-dark: #0f172a;
      --text-light: #d1fae5;
      --button-bg: #22c55e;
      --button-bg-hover: #16a34a;
      --font-sans: 'Poppins', sans-serif;
    }
    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: var(--font-sans);
      background: var(--background-dark);
      color: var(--text-light);
      overflow-x: hidden;
    }

    .background-streaks {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .streak {
      position: absolute;
      top: -50%;
      width: 2px;
      height: 200%;
      background: linear-gradient(180deg, transparent, var(--green-glow), transparent);
      filter: blur(2px);
      opacity: 0.3;
      animation: streak-move 8s linear infinite;
    }

    .streak:nth-child(1) { left: 10%; animation-delay: 0s; }
    .streak:nth-child(2) { left: 30%; animation-delay: 2s; }
    .streak:nth-child(3) { left: 50%; animation-delay: 4s; }
    .streak:nth-child(4) { left: 70%; animation-delay: 6s; }
    .streak:nth-child(5) { left: 90%; animation-delay: 1s; }

    @keyframes streak-move {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .top-bar {
      position: fixed;
      top: 0.75rem;
      left: 1rem;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--green-glow);
      user-select: none;
      z-index: 10;
      text-decoration: none;
    }

    .tagline {
      position: fixed;
      top: 3.5rem;
      left: 1rem;
      font-size: 1rem;
      z-index: 10;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 8rem auto 2rem;
      padding: 2rem;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(34, 197, 94, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .container h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--green-glow);
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      background: rgba(47, 77, 46, 0.6);
      border: 2px solid rgba(34, 197, 94, 0.3);
      border-radius: 12px;
      padding: 1.25rem;
      font-size: 1.1rem;
      color: var(--text-light);
      resize: vertical;
      min-height: 200px;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--green-glow);
      background: rgba(47, 77, 46, 0.8);
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
    }

    .submit-button {
      background-color: var(--button-bg);
      color: var(--background-dark);
      border: none;
      padding: 1rem 2rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .submit-button:hover {
      background-color: var(--button-bg-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(34, 197, 94, 0.4);
    }

    @media (max-width: 640px) {
      .container {
        margin: 6rem 1rem 2rem;
        padding: 1.5rem;
      }
      .container h2 {
        font-size: 1.4rem;
      }
      textarea {
        font-size: 1rem;
        padding: 1rem;
      }
      .submit-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="background-streaks">
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
  </div>

  <a href="index.html" class="top-bar">Sustainapath</a>
  <div class="tagline">
    <span class="text-green-400 font-semibold">Innovate.</span>
    <span class="text-white font-semibold">Optimize.</span>
    <span class="text-green-400 font-semibold">Sustain.</span>
  </div>

  <div class="container">
    <h2>Describe your chemical process in detail:</h2>
    <textarea 
      x-model="userInput" 
      placeholder="e.g. Dissolve 10g of NaCl in 100mL of water..."
    ></textarea>
    <button class="submit-button" @click="sendMessage">Analyze Process</button>
  </div>

  <script>
    function chatApp() {
      return {
        messages: [],
        userInput: '',
        chatAtBottom: false,
        sendMessage() {
          if (!this.userInput.trim()) return;

          const userMsgId = Date.now();
          this.messages.push({ id: userMsgId, text: this.userInput, from: 'user' });
          const prompt = this.userInput;
          this.userInput = '';
          this.chatAtBottom = true;

          fetch('http://localhost:8000/api/v1/process/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              prompt: prompt,
              goal: "sustainability"  // Default goal
            })
          })
          .then(res => {
            if (!res.ok) {
              throw new Error(`HTTP error! status: ${res.status}`);
            }
            return res.json();
          })
          .then(data => {
            if (data.graph) {
              localStorage.setItem('active_process_graph', JSON.stringify(data.graph));
            }
            window.location.href = 'analysis.html';
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("Could not connect to backend. Please try again.");
          });
        }
      };
    }
  </script>
</body>
</html>
